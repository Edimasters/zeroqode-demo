<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥠</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fortune Cookie</title>
  
  <!-- Шрифты: Inter для UI, Special Elite для "бумажки" -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #17AFCF;
      --primary-hover: #1499b3;
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --text-main: #111827;
      --text-muted: #6B7280;
      --border: #E2E8F0;
      
      /* Paper Text Colors (High Contrast) */
      --ink-color: #0F172A; 
      --ink-secondary: #475569;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .container { max-width: 600px; width: 100%; }

    h1 { 
      font-size: 1.75rem; 
      font-weight: 700; 
      margin-bottom: 8px; 
      color: var(--text-main); 
      letter-spacing: -0.025em;
    }
    
    h1 span { color: var(--primary); } /* "AI" or "Zeroqode" accent */

    .subtitle { 
      color: var(--text-muted); 
      margin-bottom: 2.5rem; 
      font-size: 1rem; 
      font-weight: 400;
    }

    /* --- Video Stage --- */
    .stage {
      position: relative; 
      width: 100%; 
      max-width: 500px;
      aspect-ratio: 16 / 9; 
      margin: 0 auto 2rem;
      overflow: hidden; 
      border-radius: 20px; 
      background: var(--surface);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08); /* Soft shadow for light theme */
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      border: 1px solid var(--border);
    }
    
    .stage:hover { 
      transform: translateY(-4px); 
      box-shadow: 0 20px 50px rgba(0, 82, 255, 0.12); 
    }
    
    .media { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; transition: opacity 0.6s ease; }
    .static-img { z-index: 2; }
    .anim-video { z-index: 3; opacity: 0; pointer-events: none; }

    /* State Logic */
    .stage.is-playing .static-img { opacity: 0; }
    .stage.is-playing .anim-video { opacity: 1; pointer-events: auto; }
    .stage.is-playing { cursor: default; pointer-events: none; transform: none; }

    /* --- Paper Overlay (Text on Video) --- */
    .paper-overlay {
      position: absolute; z-index: 4;
      /* Координаты под твою бумажку */
      top: 36%; left: 13%; width: 74%; height: 40%;
      
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 12px; 
      background: transparent; 
      opacity: 0; transform: scale(0.9) rotate(-2deg);
      transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      pointer-events: none; text-align: center; 
    }
    
    .stage.show-paper .paper-overlay { opacity: 1; transform: scale(1) rotate(0deg); }

    /* Text Styles */
    .line { width: 100%; margin-bottom: 6px; opacity: 0; transform: translateY(6px); transition: opacity 0.5s, transform 0.5s; }
    
    .fortune {
      font-family: 'Special Elite', monospace;
      font-size: clamp(0.85rem, 3.5vw, 1.1rem);
      font-weight: 400; color: var(--ink-color); line-height: 1.3;
      text-shadow: 0 1px 2px rgba(255,255,255,0.6); /* White glow for readability on any paper */
    }
    
    .insight {
      font-family: 'Special Elite', monospace; /* Matched font for consistency on paper */
      font-style: italic; font-size: clamp(0.7rem, 2.8vw, 0.9rem);
      color: var(--ink-secondary); margin-top: 6px;
      text-shadow: 0 1px 2px rgba(255,255,255,0.6);
    }

    .note {
      font-family: 'Special Elite', monospace;
      font-size: clamp(0.6rem, 2.5vw, 0.75rem);
      color: var(--ink-color); 
      border-top: 1px dashed #94A3B8;
      padding-top: 6px; margin-top: 8px; line-height: 1.3;
      font-weight: 600;
    }

    /* Animation Delays */
    .stage.show-paper .line:nth-child(1) { transition-delay: 0.2s; opacity: 1; transform: translateY(0); }
    .stage.show-paper .line:nth-child(2) { transition-delay: 0.5s; opacity: 1; transform: translateY(0); }
    .stage.show-paper .line:nth-child(3) { transition-delay: 0.8s; opacity: 1; transform: translateY(0); }

    /* --- Buttons --- */
    .btn-container { 
      height: 60px; display: flex; justify-content: center; align-items: center;
      position: relative; margin-top: 1rem;
    }
    
    .btn {
      background: var(--primary); color: #fff; border: none; 
      padding: 14px 32px;
      font-size: 1rem; font-weight: 600; border-radius: 12px; cursor: pointer;
      transition: all 0.2s ease; font-family: 'Inter', sans-serif;
      position: absolute; left: 50%; transform: translateX(-50%);
      box-shadow: 0 4px 12px rgba(0, 82, 255, 0.25);
    }
    
    .btn:hover { 
      background: var(--primary-hover); 
      transform: translateX(-50%) translateY(-2px); 
      box-shadow: 0 6px 16px rgba(0, 82, 255, 0.35); 
    }
    
    .btn:active { transform: translateX(-50%) translateY(0); }

    .btn.secondary {
      background: transparent; color: var(--primary);
      border: 2px solid var(--primary);
      box-shadow: none;
      opacity: 0; pointer-events: none;
    }
    
    .btn.secondary.visible { opacity: 1; pointer-events: auto; }
    .btn.secondary:hover { background: var(--primary); color: #fff; transform: translateX(-50%) translateY(-2px); }
    
    .btn.hidden { opacity: 0; pointer-events: none; }

    footer { margin-top: 3rem; color: var(--text-muted); font-size: 0.8rem; font-weight: 500; }
    footer a { color: var(--primary); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) { .stage { aspect-ratio: 4/3; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🥠 Fortune Cookie</h1>
    <p class="subtitle">Tap the cookie to reveal your wisdom for the day</p>

    <div id="stage" class="stage">
      <!-- Твои файлы видео и картинки -->
      <img id="static-img" class="media static-img" src="cookie-static.png" alt="Cookie">
      <video id="anim-video" class="media anim-video" playsinline preload="auto">
        <source src="cookie-animation.mp4" type="video/mp4">
      </video>
      <div id="paper-overlay" class="paper-overlay">
        <div id="fortune" class="line fortune"></div>
        <div id="insight" class="line insight"></div>
        <div id="note" class="line note"></div>
      </div>
    </div>

    <div class="btn-container">
      <button id="crack-btn" class="btn">Crack it open</button>
      <button id="reset-btn" class="btn secondary">↺ Try another one</button>
    </div>

    <footer>
  Built for <a href="https://zeroqode.com" target="_blank" style="color:var(--primary);text-decoration:none">Zeroqode</a> 
  | by <a href="resume.html" style="color:var(--primary);text-decoration:none;font-weight:600">Edgar Dzhagaryan</a>
</footer>
  </div>

  <script>
    // Финальный список из 17 пунктов
    const fortunes = [
      {"fortune":"The answer is hiding exactly where you haven't looked yet.","insight":"Overthinking kills momentum. Ship v1 and iterate. Motion creates clarity.","colleague_note":"Edgar ships prototypes before lunch. Hire him before he builds your competitor's product. 😉"},
      {"fortune":"Perfection is a moving target that rarely gets hit.","insight":"'Done' beats 'Perfect' every time. Release early, polish later.","colleague_note":"Edgar cut time-to-market by 30% by knowing when to stop polishing. Your team needs that discipline. 🚀"},
      {"fortune":"The quietest voice often holds the loudest truth.","insight":"Listen more than you speak. Breakthroughs rarely shout.","colleague_note":"Edgar actually listens and manages 15 people across time zones without drama. You want that energy. 😉"},
      {"fortune":"A sharp 'No' protects the soul of your project.","insight":"Guard the roadmap. Focus on what matters, cut the noise.","colleague_note":"Edgar saved a project by saying 'no' to distractions and 'yes' to profit. Smart. Hire him. 💰"},
      {"fortune":"AI handles the heavy lifting; you keep the strategy.","insight":"Automation is a smart intern. Prompt it well, verify the output, save your brain for what matters.","colleague_note":"Edgar automates grunt work with Copilot & Qwen so he can focus on strategy. You need that efficiency. 🔥"},
      {"fortune":"Calm in the storm is a superpower.","insight":"Panic is contagious, but so is confidence. Lead with composure.","colleague_note":"When everything's on fire, Edgar brings water, not gasoline. He's the calm your team needs. 😉"},
      {"fortune":"A shared laugh saves more sprints than a serious meeting.","insight":"Take the work seriously, but never take yourself too seriously.","colleague_note":"Edgar brings rhythm from his rap hobby to project management. Fun, fast, effective. Hire him. 🎤"},
      {"fortune":"The wall in front of you is a door waiting for the right key.","insight":"If the standard path is blocked, build a bridge. Innovation loves detours.","colleague_note":"Edgar connects APIs that hate each other. If there's no path, he builds one. You need that solver. 🔥"},
      {"fortune":"Glorious failure teaches more than boring success.","insight":"Break things in staging. Document the lesson. Move on.","colleague_note":"Edgar treats bugs like plot twists. He fixes them, documents the lesson, and moves on. No blame. 📚"},
      {"fortune":"Complexity is the enemy of execution.","insight":"If it can't be explained on a napkin, it's too complicated. Cut the fluff.","colleague_note":"Edgar writes documentation people actually read. Short, clear, done. Your team will thank you for him. 🤝"},
      {"fortune":"Distance is just a number; results are universal.","insight":"Master async communication. Write it clearly once, read it everywhere.","colleague_note":"Edgar jumps between time zones like a pro. He makes remote work feel seamless. You need him with that glue. 🤝"},
      {"fortune":"The best tool is the one you actually use to ship.","insight":"Stop chasing trends. Use what works. Results > Stack flexing.","colleague_note":"Edgar uses Tilda & Webflow to ship, not to flex. Results over ego. That's your hire. 🔥"},
      {"fortune":"The biggest wins hide in the details you're ignoring.","insight":"Cut the waste before you chase more budget. Efficiency beats brute force every time.","colleague_note":"Edgar cut costs by 3x by working smarter, not harder. Your CFO will thank you for him. 💵"},
      {"fortune":"True leadership clears the path, it doesn't steer every step.","insight":"Give the 'Why', trust the 'How'. Micromanagement suffocates talent.","colleague_note":"Edgar clears roadblocks and steps back. He trusts the team to deliver. Autonomy is his superpower. 🤝"},
      {"fortune":"Curiosity is the compass that navigates the unknown.","insight":"The expert was once a beginner who didn't quit. Learn fast, apply faster.","colleague_note":"Edgar learns new domains before the coffee gets cold. Fast learner, faster doer. 🧠"},
      {"fortune":"Momentum is a precious fuel. Don't let it cool down.","insight":"Small wins daily beat one big launch in six months. Keep moving.","colleague_note":"Edgar turns 'someday' into 'Friday'. Fast, focused, and reliable. You need that pace. 🚀"},
      {"fortune":"The missing piece of the puzzle is already in the room.","insight":"Sometimes the solution isn't a process; it's a person.","colleague_note":"Edgar is the missing piece. Code, creativity, strategy—the full package. Hire him before your competitor does. 😉"}
    ];
    
    let currentIndex = -1;
    let isIdle = true;

    const stage = document.getElementById('stage');
    const video = document.getElementById('anim-video');
    const crackBtn = document.getElementById('crack-btn');
    const resetBtn = document.getElementById('reset-btn');
    const PAPER_APPEARS_AT = 6; // Время появления бумажки в видео (секунды)

    function loadRandom() {
      let next;
      do { next = Math.floor(Math.random() * fortunes.length); } while (next === currentIndex);
      currentIndex = next;

      document.getElementById('fortune').textContent = fortunes[next].fortune;
      document.getElementById('insight').textContent = fortunes[next].insight;
      document.getElementById('note').textContent = fortunes[next].colleague_note;
    }

    function openCookie() {
      if (!isIdle) return;
      isIdle = false;

      crackBtn.classList.add('hidden');
      stage.classList.add('is-playing');
      
      video.currentTime = 0;
      video.play().catch(e => console.log("Autoplay blocked:", e));
      
      loadRandom();
      
      setTimeout(() => {
        stage.classList.add('show-paper');
        setTimeout(() => {
          resetBtn.classList.add('visible');
        }, 1000);
      }, PAPER_APPEARS_AT * 1000);
    }

    function reset() {
      resetBtn.classList.remove('visible');
      stage.classList.remove('show-paper', 'is-playing');
      video.pause();
      video.currentTime = 0;
      
      setTimeout(() => {
        crackBtn.classList.remove('hidden');
        isIdle = true;
      }, 600);
    }

    // Клик по видео или кнопке запускает процесс
    stage.addEventListener('click', (e) => {
      if (e.target.closest('.btn')) return;
      openCookie();
    });

    crackBtn.addEventListener('click', openCookie);
    resetBtn.addEventListener('click', reset);
  </script>
</body>
</html>
